<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumina Gallery - Login</title>

  <link rel="stylesheet" href="style.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="login-body">

  <div class="bg-blur one"></div>
  <div class="bg-blur two"></div>

  <div class="login-container">

    <div class="logo-section">

      <div class="logo">

        <svg width="70" height="70" viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="45" stroke="#fff" stroke-width="6"/>
          <circle cx="50" cy="50" r="15" fill="#fff"/>
          <path d="M10 50C20 25 40 15 50 15C60 15 80 25 90 50" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
        </svg>

      </div>

      <h1>Lumina Gallery</h1>

      <p>Explore creativity in every frame</p>

    </div>

    <form class="login-form" id="loginForm">

      <h2>Login</h2>

      <div class="input-group">
        <input type="email" id="email" required />
        <label>Email Address</label>
      </div>

      <div class="input-group">
        <input type="password" id="password" required />
        <label>Password</label>
      </div>

      <div class="forgot">
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn">
        Enter Gallery
      </button>

    </form>

  </div>

  <script src="script.js"></script>

</body>
</html>
